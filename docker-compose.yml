version: "3.9"

services:
  backend:
    build: ./backend
    container_name: codebase-ai-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: codebase-ai-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  upload_data:
